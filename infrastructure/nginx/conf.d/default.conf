server {
    listen 80;
    server_name localhost;

    # Налаштування логів
    log_format prois_main '$remote_addr - $request_id - "$request" '
                          '$status $body_bytes_sent '
                          '$request_time $upstream_response_time '
                          '$upstream_addr';
    access_log /var/log/nginx/access.log prois_main;
    error_log  /var/log/nginx/error.log warn;

    # Таймаути
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 15s;

    # Заголовки за замовчуванням
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Correlation ID трасування
    set $corr_id $http_x_correlation_id;
    if ($corr_id = "") { set $corr_id $request_id; }
    proxy_set_header X-Correlation-Id $corr_id;

    # Healthcheck проксі
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","component":"nginx-proxy"}';
    }

    # 1. Маршрут до Student Service (порт 8000)
    location /api/v1/students/ {
        proxy_pass http://student-service:8000/api/v1/students/;
    }

    # 2. Маршрут до Order Service (порт 8080)
    location /api/v1/orders/ {
        proxy_pass http://order-service:8080/orders/;
    }

    # 3. Маршрут до Wallet Service (порт 8080)
    location /api/v1/wallets/ {
        proxy_pass http://wallet-service:8080/;
    }

    # 4. Маршрут до Marketplace Service (порт 8080)
    location /api/v1/marketplace/ {
        proxy_pass http://marketplace-service:8080/api/v1/marketplace/;
    }
}